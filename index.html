<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Alimentos</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f9f9f9;
}
header {
  background:#4CAF50;
  color:white;
  padding:15px;
  text-align:center;
}
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:20px;
  padding:20px;
}
.producto {
  background:white;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
  padding:15px;
}
.producto img {
  width:100%;
  max-height:120px;
  object-fit:cover;
  border-radius:6px;
}
.producto h3 {
  margin:10px 0 5px;
  font-size:16px;
}
.producto p {
  margin:0;
  color:#555;
}
button {
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#FFD700;
  font-weight:bold;
  cursor:pointer;
}
button:hover {
  background:#FFC107;
}
</style>
</head>
<body>

<header>
  <h1>Compras de Alimentos Online</h1>
  <p>Tu mercado en casa</p>
</header>

<div class="container">
  <div class="producto">
    <img src="https://via.placeholder.com/150?text=Pan" alt="Pan">
    <h3>Pan Fresco</h3>
    <p>$1.00</p>
    <button>Comprar</button>
  </div>
  <div class="producto">
    <img src="https://via.placeholder.com/150?text=Leche" alt="Leche">
    <h3>Leche</h3>
    <p>$0.80</p>
    <button>Comprar</button>
  </div>
  <div class="producto">
    <img src="https://via.placeholder.com/150?text=Queso" alt="Queso">
    <h3>Queso</h3>
    <p>$2.50</p>
    <button>Comprar</button>
  </div>
  <div class="producto">
    <img src="https://via.placeholder.com/150?text=Tomates" alt="Tomates">
    <h3>Tomates</h3>
    <p>$1.20</p>
    <button>Comprar</button>
  </div>
</div>

</body>
</html>
